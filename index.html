<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Baby Sleep Recorder</title>
  <style>
    :root {
      color-scheme: light dark;
      --accent: #7b61ff;
      --text: #15151a;
      --muted: #63636f;
      --bg: #f6f5fb;
      --card: #ffffff;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --text: #f7f7fb;
        --muted: #b9b7c8;
        --bg: #111021;
        --card: #1c1a2c;
      }
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      display: grid;
      place-items: center;
      padding: 32px 20px;
    }

    main {
      width: min(720px, 100%);
      background: var(--card);
      border-radius: 28px;
      padding: 40px;
      box-shadow: 0 18px 60px rgba(54, 45, 120, 0.16);
    }

    .icon {
      width: 72px;
      height: 72px;
      display: grid;
      place-items: center;
      border-radius: 20px;
      background: linear-gradient(135deg, #8a72ff, #4f7dff);
      color: white;
      font-size: 36px;
      margin-bottom: 24px;
    }

    h1 {
      margin: 0 0 12px;
      font-size: clamp(34px, 7vw, 56px);
      line-height: 1;
      letter-spacing: 0;
    }

    p {
      margin: 0 0 24px;
      color: var(--muted);
      font-size: 18px;
      line-height: 1.55;
    }

    a {
      color: var(--accent);
      font-weight: 700;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <main>
    <div class="icon" aria-hidden="true">☾</div>
    <h1>Baby Sleep Recorder</h1>
    <p>A calm, local-only baby sleep tracker for naps, nights, growth notes, reminders, and private photo memories.</p>
    <a href="./privacy.html">Privacy Policy</a>
  </main>
</body>
</html>
